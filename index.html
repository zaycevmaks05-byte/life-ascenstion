<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  min-height:100vh;
  background:radial-gradient(1200px 600px at 10% -10%, #1a1d3d 0%, #0e0f24 55%, #0a0b1a 100%);
  background-attachment:fixed;
  color:#e9e9f5;
  font-family:'JetBrains Mono',ui-monospace,monospace;
  padding:16px 14px calc(96px + env(safe-area-inset-bottom));
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;color:inherit}
button:active{transform:scale(.97)}
input,select,textarea{font-family:inherit}
/* ── живой фон ── */
.orb{position:fixed;border-radius:50%;filter:blur(70px);opacity:.22;pointer-events:none;z-index:0}
#orb1{width:280px;height:280px;background:#6f9ceb;top:-70px;left:-90px;animation:drift1 19s ease-in-out infinite alternate}
#orb2{width:320px;height:320px;background:#c76fe8;bottom:-110px;right:-110px;animation:drift2 24s ease-in-out infinite alternate}
@keyframes drift1{to{transform:translate(70px,90px) scale(1.15)}}
@keyframes drift2{to{transform:translate(-80px,-70px) scale(1.08)}}
#app{position:relative;z-index:1}
/* ── шапка ── */
.eyebrow{font-size:9px;letter-spacing:2px;color:#6f9ceb;margin-bottom:4px}
.top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.titlerow{display:flex;align-items:center;gap:8px}
.title{font-family:'Press Start 2P',monospace;font-size:14px;color:#f3f3fb}
.hard{display:inline-flex;align-items:center;gap:3px;font-size:8px;letter-spacing:1px;color:#e6584f;border:1px solid #e6584f55;border-radius:5px;padding:3px 6px;animation:pulseGlow 2.4s ease-in-out infinite}
.cur{text-align:right}
.gold{font-size:14px;font-weight:700;color:#e8b84b;text-shadow:0 0 14px #e8b84b44}
.lvl{font-size:9px;color:#8b8fb8;margin-top:3px}
.xptrack{height:9px;border-radius:6px;background:#181a37;border:1px solid #262a52;overflow:hidden}
.xpfill{height:100%;background:linear-gradient(90deg,#6f9ceb,#e8b84b);transition:width .4s ease;position:relative;overflow:hidden}
.xpfill::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.35) 50%,transparent 70%);transform:translateX(-100%);animation:shimmer 2.8s ease-in-out infinite}
@keyframes shimmer{to{transform:translateX(100%)}}
.xplabel{font-size:9px;color:#8b8fb8;margin:5px 0 14px}
/* ── панели ── */
.panel{background:linear-gradient(180deg,#14173a 0%,#101230 100%);border:1px solid #262a52;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 12px 30px -20px rgba(0,0,0,.9), inset 0 1px 0 #ffffff0d}
.phead{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:1px;color:#6f9ceb;margin-bottom:10px}
.empty{font-size:11px;color:#5c5f88}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:10px;background:#0e0f24;border:1px solid #23264a;border-radius:20px;padding:6px 10px;color:#d3d5ee}
.chips{display:flex;flex-wrap:wrap;gap:8px}
/* ── статы ── */
.statcard{background:linear-gradient(180deg,#14173a 0%,#101230 100%);border:1px solid #262a52;border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:inset 0 1px 0 #ffffff0d}
.sctop{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sicon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.sname{font-size:13px;font-weight:700;color:#f3f3fb}
.slvl{font-size:10px;color:#8b8fb8;margin-top:1px}
.logbtn{display:flex;align-items:center;gap:4px;font-size:10px;background:transparent;border:1px solid;border-radius:7px;padding:6px 10px;transition:background .15s}
.track{height:7px;border-radius:5px;background:#0e0f24;overflow:hidden}
.fill{height:100%;transition:width .4s ease}
.xpnum{font-size:9px;color:#6a6e97;margin-top:5px;text-align:right}
/* ── квесты ── */
.qrow{display:flex;align-items:center;gap:9px;background:transparent;border:none;padding:9px 4px;border-radius:7px;text-align:left;width:100%;font-size:12px;color:#d3d5ee}
.qrow:hover{background:#171a3a}
.qmark{width:17px;text-align:center;flex-shrink:0}
.qreward{font-size:9px;white-space:nowrap;flex-shrink:0;margin-left:6px}
.done{text-decoration:line-through;opacity:.55}
.boss{background:#0e0f24;border:1px solid #23264a;border-radius:10px;padding:11px;margin-bottom:10px}
.bosstop{display:flex;justify-content:space-between;align-items:center;gap:8px}
.bossname{font-size:12px;font-weight:700;color:#f3f3fb}
.bossrew{font-size:10px;color:#e8b84b;white-space:nowrap}
.bossdesc{font-size:10px;color:#8b8fb8;margin:4px 0 6px}
.skilltop{display:flex;justify-content:space-between;font-size:11px;color:#d3d5ee;margin-bottom:4px}
/* ── недельные квесты ── */
.wqrow{display:flex;align-items:center;gap:8px;background:#0e0f24;border:1px solid #23264a;border-radius:10px;padding:9px 10px;margin-bottom:7px;font-size:11px}
.wqprog{font-size:10px;font-weight:700;color:#6f9ceb;min-width:32px;text-align:center;flex-shrink:0}
.wqlabel{flex:1;color:#d3d5ee;word-break:break-word}
.wqmeta{font-size:9px;color:#8b8fb8;margin-top:2px}
.wqbtn{width:28px;height:28px;border-radius:8px;background:#14173a;border:1px solid #2c2f52;font-size:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0}
.wqbtn.plus{color:#4bc9a8;border-color:#4bc9a855}
.wqbtn.minus{color:#8b8fb8}
.wqbtn.del{color:#e6584f;border-color:#e6584f33;font-size:11px}
/* ── срочный квест (Solo Leveling) ── */
.urgent{background:linear-gradient(180deg,#1a1030,#141028);border:1px solid #e6584f88;border-radius:14px;padding:14px;margin-bottom:10px;animation:urgentPulse 2s ease-in-out infinite}
@keyframes urgentPulse{0%,100%{box-shadow:0 0 18px -8px #e6584f88}50%{box-shadow:0 0 26px -4px #e6584fcc}}
.urgent .phead{color:#ff7b72}
/* ── график ── */
.chart{display:flex;align-items:flex-end;gap:6px;height:110px;padding-top:14px}
.ccol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.cval{font-size:8px;color:#8b8fb8;margin-bottom:3px}
.cbar{width:100%;max-width:26px;border-radius:4px 4px 0 0;background:linear-gradient(180deg,#6f9ceb,#3d5fa8);min-height:2px;transition:height .4s ease}
.cbar.neg{background:linear-gradient(180deg,#e6584f,#a33)}
.cbar.today{background:linear-gradient(180deg,#e8b84b,#c98a2e)}
.cday{font-size:8px;color:#5c5f88;margin-top:5px}
.cday.today{color:#e8b84b;font-weight:700}
/* ── лавка ── */
.shoprow{display:flex;align-items:center;gap:10px;background:#0e0f24;border:1px solid #23264a;border-radius:10px;padding:9px 11px;margin-bottom:7px}
.buy{font-size:10px;background:linear-gradient(90deg,#e8b84b,#e8834b);border:none;color:#12122b;font-weight:700;border-radius:7px;padding:8px 12px;box-shadow:0 4px 14px -6px #e8b84b88}
.buy:disabled{opacity:.35;box-shadow:none}
/* ── журнал ── */
.hrow{display:flex;align-items:baseline;gap:8px;font-size:11px;margin-bottom:9px;animation:floatIn .2s ease}
.hpts{font-weight:700;min-width:26px}
.hlabel{flex:1;color:#d3d5ee;word-break:break-word}
.hgold{font-size:9px;color:#e8b84b;white-space:nowrap}
.hcat{font-size:9px;color:#5c5f88;white-space:nowrap}
.htime{font-size:8px;color:#454868;white-space:nowrap}
/* ── дневник ── */
.note{background:#0e0f24;border:1px solid #23264a;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.notehead{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.notedate{font-size:9px;color:#6f9ceb}
.notedel{background:transparent;border:none;color:#5c5f88;font-size:11px;padding:2px 4px}
.notetext{white-space:pre-wrap;word-break:break-word;font-size:11px;color:#d3d5ee;line-height:1.6}
/* ── навигация ── */
nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:rgba(10,11,26,.94);backdrop-filter:blur(8px);border-top:1px solid #23264a;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:40}
.navb{display:flex;flex-direction:column;align-items:center;background:transparent;border:none;padding:6px 12px;position:relative;color:#5c5f88}
.navb.on{color:#8fb4f5}
.navb.on::before{content:"";position:absolute;top:0;bottom:1px;left:3px;right:3px;background:#6f9ceb14;border:1px solid #6f9ceb2e;border-radius:11px}
.navb .ni{font-size:18px;line-height:1;position:relative}
.navb .nl{font-size:8.5px;margin-top:4px;letter-spacing:.5px;position:relative}
/* ── модалки ── */
.overlay{position:fixed;inset:0;background:rgba(6,7,17,.78);display:flex;align-items:flex-end;justify-content:center;z-index:60}
.sheet{width:100%;max-width:480px;background:linear-gradient(180deg,#15183c,#101230);border:1px solid #262a52;border-radius:16px 16px 0 0;padding:16px;max-height:82vh;overflow-y:auto;box-shadow:0 -12px 40px -14px rgba(0,0,0,.9)}
.sheet.syswin{border:1px solid #6f9ceb99;box-shadow:0 -12px 44px -12px #6f9ceb66, inset 0 0 24px -14px #6f9ceb55}
.mhead{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700;margin-bottom:8px;color:#f3f3fb}
.xbtn{background:transparent;border:none;color:#8b8fb8;font-size:16px;padding:2px 6px}
.mnote{font-size:9px;color:#8b8fb8;margin-bottom:10px;line-height:1.5}
.act{display:flex;justify-content:space-between;gap:10px;background:#0e0f24;border:1px solid #23264a;border-radius:9px;padding:11px 12px;font-size:12px;text-align:left;width:100%;margin-bottom:7px}
.act:hover{border-color:currentColor}
.pos{color:#4bc9a8}.neg{color:#e6584f}
.custom{background:transparent;border:1px dashed #3a3e6a;color:#8b8fb8;border-radius:9px;padding:10px 12px;font-size:12px;width:100%;margin-top:2px}
.flabel{font-size:10px;color:#8b8fb8;margin:8px 0 4px;display:block}
.finput{background:#0e0f24;border:1px solid #23264a;color:#e9e9f5;border-radius:8px;padding:9px 10px;font-size:12px;width:100%}
textarea.finput{min-height:110px;resize:vertical;font-size:10px;line-height:1.5}
.submit{margin-top:12px;background:linear-gradient(90deg,#6f9ceb,#4bc9a8);border:none;color:#0a0b1a;font-weight:700;border-radius:9px;padding:11px 12px;font-size:12px;width:100%;box-shadow:0 6px 18px -8px #4bc9a888}
.perkopt{display:block;background:#0e0f24;border:1px solid #23264a;border-radius:9px;padding:12px 14px;text-align:left;width:100%;margin-bottom:7px}
.perkopt:hover{border-color:#4bc9a8}
/* ── герой ── */
.herostage{position:relative;display:flex;flex-direction:column;align-items:center;padding:16px 0 20px;background:radial-gradient(420px 240px at 50% 28%, #1e2350 0%, transparent 70%);border-radius:16px;margin-bottom:12px;overflow:hidden}
.hero-wrap{position:relative}
.hero-bob{animation:heroBob 3s ease-in-out infinite}
.aura{position:absolute;inset:-10px;border-radius:50%;animation:auraPulse 2.4s ease-in-out infinite}
.floor{width:150px;height:24px;border-radius:50%;background:radial-gradient(ellipse at center,#6f9ceb26,transparent 70%);margin-top:-12px}
.heroname{font-family:'Press Start 2P',monospace;font-size:11px;color:#f3f3fb;margin-top:8px}
.herosub{font-size:10px;color:#e8b84b;margin-top:6px}
.herotitle{font-size:10px;color:#8fb4f5;margin-top:6px;border:1px solid #6f9ceb44;border-radius:14px;padding:4px 12px;background:#6f9ceb12;box-shadow:0 0 14px -6px #6f9ceb88}
.spark{position:absolute;color:#e8b84b;opacity:0;animation:twinkle 3.2s ease-in-out infinite;font-size:12px;pointer-events:none;z-index:1}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5) rotate(0deg)}50%{opacity:.95;transform:scale(1.05) rotate(20deg)}}
.eye{transform-box:fill-box;transform-origin:center;animation:blink 4.6s infinite}
@keyframes blink{0%,90%,100%{transform:scaleY(1)}93%,96%{transform:scaleY(.12)}}
/* ── прочее ── */
.intens{display:flex;gap:7px;margin:8px 0 4px}
.ibtn{flex:1;background:#0e0f24;border:1px solid #23264a;border-radius:9px;padding:9px 4px;display:flex;flex-direction:column;align-items:center;gap:3px}
.ibtn.on{border-color:#e6584f;background:#e6584f18}
.inum{font-size:14px;font-weight:700}
.ixp{font-size:8px;color:#8b8fb8}
.settingsrow{display:flex;gap:8px;flex-wrap:wrap}
.setbtn{font-size:10px;background:#0e0f24;border:1px solid #23264a;border-radius:8px;padding:8px 11px;color:#8b8fb8}
.swatch{width:28px;height:28px;border-radius:50%;border:2px solid #23264a;padding:0;flex-shrink:0}
.swatch.on{border-color:#4bc9a8;box-shadow:0 0 10px -2px #4bc9a888}
.fineprint{font-size:8px;color:#454868;text-align:center;margin-top:14px;line-height:1.6}
#toasts{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:6px;align-items:center;width:max-content;max-width:88vw}
.toast{background:linear-gradient(90deg,#e8b84b,#e8834b);color:#12122b;padding:8px 14px;border-radius:20px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:6px;box-shadow:0 8px 24px -8px rgba(232,184,75,.7);animation:floatIn .25s ease;max-width:88vw}
.toast.bad{background:linear-gradient(90deg,#e6584f,#a33);color:#fff;box-shadow:0 8px 24px -8px rgba(230,88,79,.7)}
.toast.sys{background:linear-gradient(90deg,#3d6fd6,#6f9ceb);color:#fff;box-shadow:0 8px 24px -8px #6f9cebaa;border:1px solid #9dbcf7}
.slothead{font-size:10px;letter-spacing:1px;color:#6f9ceb;margin:12px 0 8px}
.hint{font-size:10px;color:#8b8fb8;margin-top:8px;line-height:1.5}
.ok{color:#4bc9a8}
@keyframes floatIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes auraPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
@keyframes heroBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 14px -6px rgba(230,88,79,.5)}50%{box-shadow:0 0 22px -4px rgba(230,88,79,.8)}}
.scroll::-webkit-scrollbar{width:6px}
.scroll::-webkit-scrollbar-thumb{background:#2c2f52;border-radius:4px}

const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const dstr = d => d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const today = () => dstr(new Date());
const yesterday = () => dstr(new Date(Date.now()-86400000));
const dateShift = days => dstr(new Date(Date.now()-days*86400000));
const fmtTime = ts => { const d=new Date(ts); return String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };
const fmtClock = () => { const d=new Date(); return WDAYS[d.getDay()]+" "+String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+" · "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };
function weekMonday(){ const d=new Date(); const off=(d.getDay()+6)%7; return dstr(new Date(Date.now()-off*86400000)); }
function weekSunday(){ const mon=new Date(weekMonday()+"T00:00:00"); const sun=new Date(mon.getTime()+6*86400000); return String(sun.getDate()).padStart(2,"0")+"."+String(sun.getMonth()+1).padStart(2,"0"); }

function loadJSON(k, dflt){ try{ const r=localStorage.getItem(k); return r?JSON.parse(r):dflt; }catch(e){ return dflt; } }
function persistSnaps(){ try{ localStorage.setItem(KEY_SNAPS, JSON.stringify(SNAPS)); }catch(e){} }
function persistNotes(){ try{ localStorage.setItem(KEY_NOTES, JSON.stringify(NOTES)); }catch(e){} }
function pruneSnaps(){ const ds=Object.keys(SNAPS).sort(); while(ds.length>35){ delete SNAPS[ds.shift()]; } }
function ensureSnapshot(){ const t=today(); if(!SNAPS[t]){ SNAPS[t]=JSON.stringify(S); pruneSnaps(); persistSnaps(); } }
function findSnapAtOrBefore(dateStr){
  const ds = Object.keys(SNAPS).sort();
  if(!ds.length) return null;
  let best = null;
  for(const d of ds){ if(d <= dateStr) best = d; }
  return best || ds[0];
}

function newDaily(){
  const pool = [...CONFIG.RANDOM_QUESTS];
  for(let i = pool.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  let urgent = null;
  if(Math.random() < CONFIG.URGENT.CHANCE && CONFIG.URGENT.QUESTS.length){
    const uq = CONFIG.URGENT.QUESTS[Math.floor(Math.random()*CONFIG.URGENT.QUESTS.length)];
    urgent = { id: uq.id, done: false };
  }
  return { date: today(), checks: {}, claimed: false, urgent,
    random: pool.slice(0, CONFIG.RANDOM_QUESTS_PER_DAY).map(q => ({ id: q.id, done: false })) };
}

function fresh(){
  const stats = {}; CONFIG.STATS.forEach(c => stats[c.key] = { xp: 0 });
  const skills = {}; CONFIG.SKILLS.forEach(s => skills[s.key] = 0);
  return {
    v: 1, stats, discipline: { xp: 0 }, skills,
    gold: CONFIG.START_GOLD, inventory: [], equipped: { head:null, body:null, weapon:null, aura:null },
    history: [], streak: 0, lastLogDate: null,
    unlocked: [], perks: [], perfectDays: 0, bossesDone: [],
    seasonStart: today(), lastTitle: null,
    profile: { name: CONFIG.HERO_NAME, gender: "m", hair: "curtains", hairColor: "#5a3d26", skin: "#e8b58c", beard: true },
    weekly: { weekStart: weekMonday(), quests: [] },
    daily: newDaily(),
  };
}

function migrate(s){
  const f = fresh(), out = Object.assign({}, f, s);
  out.stats = {}; CONFIG.STATS.forEach(c => out.stats[c.key] = { xp: (s.stats && s.stats[c.key] && +s.stats[c.key].xp) || 0 });
  out.discipline = { xp: (s.discipline && +s.discipline.xp) || 0 };
  out.skills = Object.assign({}, f.skills, s.skills || {});
  out.equipped = Object.assign({}, f.equipped, s.equipped || {});
  ["inventory","history","unlocked","perks","bossesDone"].forEach(k => { if(!Array.isArray(out[k])) out[k] = []; });
  if(!out.daily || out.daily.date !== today()) out.daily = newDaily();
  else {
    if(!Array.isArray(out.daily.random) || !out.daily.random.length) out.daily.random = newDaily().random;
    if(out.daily.urgent === undefined) out.daily.urgent = null;
  }
  if(!out.weekly || !out.weekly.weekStart || !Array.isArray(out.weekly.quests)) out.weekly = { weekStart: weekMonday(), quests: [] };
  out.profile = Object.assign({}, f.profile, s.profile || {});
  if(!out.seasonStart) out.seasonStart = today();
  if(out.lastTitle === undefined) out.lastTitle = null;
  out.gold = Math.max(0, +out.gold || 0);
  out.streak = Math.max(0, +out.streak || 0);
  out.perfectDays = Math.max(0, +out.perfectDays || 0);
  return out;
}

function load(){
  try { const raw = localStorage.getItem(KEY); return raw ? migrate(JSON.parse(raw)) : fresh(); }

/* ── математика ── */
const statLevel = xp => Math.max(1, Math.floor(Math.max(0, xp) / 100) + 1);
const statProg  = xp => Math.min(100, (Math.max(0, xp) % 100));
const xpNeed = l => CONFIG.LEVEL_BASE + CONFIG.LEVEL_STEP * (l - 1);
function totalXp(s){ return CONFIG.STATS.reduce((a,c)=>a+s.stats[c.key].xp,0) + s.discipline.xp; }
function overall(){
  let level = 1, rem = Math.max(0, totalXp(S));
  while(rem >= xpNeed(level)){ rem -= xpNeed(level); level++; }
  const need = xpNeed(level);
  const rank = [...CONFIG.RANKS].reverse().find(r => level >= r.min) || CONFIG.RANKS[0];
  return { level, into: rem, need, progress: Math.min(100,(rem/need)*100), rank: rank.title };
}
const discBonus = () => Math.min(CONFIG.DISC_BONUS_CAP, Math.max(0,(statLevel(S.discipline.xp)-1)*CONFIG.DISC_BONUS_PER_LVL));
const perkBonus = cat => (S.perks.find(p => p.stat === cat) ? CONFIG.PERK_BONUS : 0);
const effGain = (base, cat) => Math.max(1, Math.round(base * CONFIG.HARD.gainMult * (1 + discBonus() + perkBonus(cat))));
const effPenalty = base => Math.round(base * CONFIG.HARD.penaltyMult);
const countTag = (tag, s = S) => s.history.filter(h => h.tag === tag && h.points > 0).length;
const seasonDay = () => Math.max(1, Math.floor((Date.now() - new Date(S.seasonStart+"T00:00:00").getTime())/86400000)+1);
function applyStatDelta(cat, delta){
  if(cat === "discipline") S.discipline.xp += delta;
  else if(S.stats[cat]) S.stats[cat].xp += delta;
}
function catCfg(cat){ return cat === "discipline" ? CONFIG.DISCIPLINE : CONFIG.STATS.find(c => c.key === cat); }

/* ── профиль персонажа ── */
function shade(hex, f){
  const n = parseInt(hex.slice(1), 16);
  let r = (n>>16)&255, g = (n>>8)&255, b = n&255;
  const t = f < 0 ? 0 : 255, p = Math.abs(f);
  r = Math.round(r + (t - r) * p); g = Math.round(g + (t - g) * p); b = Math.round(b + (t - b) * p);
  return "#" + ((1<<24) + (r<<16) + (g<<8) + b).toString(16).slice(1);
}

  CONFIG.STATS.forEach(c => { const x = S.stats[c.key].xp; if(x > bx){ bx = x; best = c.key; } });
  if(S.discipline.xp > bx){ best = "discipline"; bx = S.discipline.xp; }
  if(bx <= 0) return null;
  const lvl = statLevel(bx);
  const tiers = CONFIG.TITLES[best];
  if(!tiers) return null;
  let t = null;
  CONFIG.TITLE_LEVELS.forEach((L, i) => { if(lvl >= L) t = tiers[i]; });
  return t;
}

/* ── игровые события ── */
function touchDay(){
  const t = today();
  if(S.lastLogDate !== t){
    S.streak = (S.lastLogDate === yesterday()) ? S.streak + 1 : 1;
    S.lastLogDate = t;
  }
}
function checkAch(){
  ACH.forEach(a => {
    if(!S.unlocked.includes(a.id) && a.ok(S)){
      S.unlocked.push(a.id);
      toast("🏆 " + a.label);
    }
  });
}
function checkBosses(){
  CONFIG.BOSSES.forEach(b => {
    if(S.bossesDone.includes(b.id)) return;
    const prog = b.type === "streak" ? S.streak : countTag(b.countTag);
    if(prog >= b.target){
      S.bossesDone.push(b.id);
      S.discipline.xp += b.rewardXp;
      S.gold += b.rewardGold;
      S.history.unshift({ ts: Date.now(), cat: "discipline", label: "⚔️ Босс повержен: " + b.name, points: b.rewardXp, gold: b.rewardGold, sys: true });
      toast("⚔️ Босс повержен: " + b.name + "! +" + b.rewardGold + "🪙", "sys");
    }
  });
}
function checkLevelUp(prevTotal){
  let before = 1, r1 = Math.max(0, prevTotal);
  while(r1 >= xpNeed(before)){ r1 -= xpNeed(before); before++; }
  const after = overall().level;
  if(after > before){
    S.gold += CONFIG.LEVELUP_GOLD * (after - before);
    const taken = S.perks.map(p => p.stat);
    const pool = CONFIG.PERKS.filter(p => !taken.includes(p.stat));
    const opts = pool.sort(()=>0.5-Math.random()).slice(0,3);
    if(opts.length){ UI.perkOptions = opts; UI.perkLevel = after; UI.modal = "perk"; }
    else toast("⚙ СИСТЕМА · Уровень " + after + "! +" + (CONFIG.LEVELUP_GOLD*(after-before)) + "🪙", "sys");
  }
}

function logAction(cat, label, basePoints, skill, tag, meta){
  const prevTotal = totalXp(S);
  let pts, gold;
  if(basePoints > 0){
    pts = effGain(basePoints, cat);
    gold = Math.max(1, Math.round(pts * CONFIG.GOLD_RATIO));
    S.gold += gold;
  } else {
    pts = effPenalty(basePoints);
    gold = -Math.min(S.gold, Math.round(Math.abs(pts) * CONFIG.GOLD_RATIO));
    S.gold += gold;
  }
  applyStatDelta(cat, pts);

  let skillGain = 0;
  if(skill && basePoints > 0){
    const beforeSkill = S.skills[skill] || 0;
    S.skills[skill] = Math.min(100, beforeSkill + Math.max(1, Math.round(basePoints * CONFIG.SKILL_GAIN_RATIO)));
    skillGain = S.skills[skill] - beforeSkill;
  }
  touchDay();
  const entry = { ts: Date.now(), cat, label, points: pts, gold, tag: tag || null };
  if(skill && skillGain) { entry.skill = skill; entry.skillGain = skillGain; }
  if(meta && meta.rq) entry.rq = meta.rq;
  S.history.unshift(entry);
  if(S.history.length > 150) S.history.length = 150;

  if(pts < 0) toast(pts + " XP · " + gold + "🪙 — Hard Mode не прощает", "bad");
  else toast("+" + pts + " XP · +" + gold + "🪙");

  checkLevelUp(prevTotal);
  checkBosses();
  checkAch();
  checkTitle();
  if(UI.modal !== "perk") UI.modal = null;
  persist(); render();
}

/* точные начисления (недельные и срочные квесты) — без Hard-модификатора */
function logExact(cat, label, xp, flag){
  const prevTotal = totalXp(S);
  const gold = xp > 0 ? Math.max(1, Math.round(xp * CONFIG.GOLD_RATIO)) : -Math.min(S.gold, Math.round(Math.abs(xp) * CONFIG.GOLD_RATIO));
  S.gold += gold;
  applyStatDelta(cat, xp);
  touchDay();
  const entry = Object.assign({ ts: Date.now(), cat, label, points: xp, gold }, flag || {});
  S.history.unshift(entry);
  if(S.history.length > 150) S.history.length = 150;
  toast((xp > 0 ? "+" : "") + xp + " XP · " + (gold > 0 ? "+" : "") + gold + "🪙");
  checkLevelUp(prevTotal);
  checkAch();
  checkTitle();
  persist(); render();
}

function applyUrgentPenalty(daily){
  if(daily && daily.urgent && !daily.urgent.done){
    const uq = CONFIG.URGENT.QUESTS.find(q => q.id === daily.urgent.id);
    S.discipline.xp -= CONFIG.URGENT.PENALTY;
    S.gold = Math.max(0, S.gold - Math.round(CONFIG.URGENT.PENALTY / 2));
    S.history.unshift({ ts: Date.now(), cat: "discipline", label: "⚙ Наказание системы: провален срочный квест" + (uq ? " «"+uq.label+"»" : ""), points: -CONFIG.URGENT.PENALTY, gold: -Math.round(CONFIG.URGENT.PENALTY/2), sys: true });
    toast("⚙ СИСТЕМА · Наказание: −" + CONFIG.URGENT.PENALTY + " Дисциплина", "bad");
  }
}
function ensureDailyFresh(){
  if(S.daily.date !== today()){
    applyUrgentPenalty(S.daily);
    S.daily = newDaily();
    persist();
  }
}

/* ── недельные квесты ── */
function ensureWeek(){
  if(!S.weekly) S.weekly = { weekStart: weekMonday(), quests: [] };
  if(S.weekly.weekStart !== weekMonday()){
    let failedN = 0, failedXp = 0;
    S.weekly.quests.forEach(q => {
      if(!q.done && q.penalty > 0){
        failedN++; failedXp += q.penalty;
        applyStatDelta(q.cat, -q.penalty);
        S.gold = Math.max(0, S.gold - Math.round(q.penalty / 2));
        S.history.unshift({ ts: Date.now(), cat: q.cat, label: "📅 Провален недельный квест: " + q.label, points: -q.penalty, gold: 0, sys: true });
      }
    });
    S.weekly = { weekStart: weekMonday(), quests: [] };
    persist();
    if(failedN) toast("⚙ СИСТЕМА · Неделя закрыта: провалено " + failedN + ", −" + failedXp + " XP", "bad");
    else toast("⚙ СИСТЕМА · Новая неделя. Впиши квесты недели!", "sys");
  }
}
function wqAdd(){
  const label = document.getElementById("wqLabel").value.trim();
  const cat = document.getElementById("wqCat").value;
  const reward = Math.round(parseFloat(document.getElementById("wqReward").value) || 0);
  const penalty = Math.round(parseFloat(document.getElementById("wqPenalty").value) || 0);
  const target = Math.max(1, Math.round(parseFloat(document.getElementById("wqTarget").value) || 1));
  if(!label){ toast("Напиши название квеста", "bad"); return; }
  if(reward <= 0){ toast("Награда должна быть больше 0", "bad"); return; }
  if(S.weekly.quests.length >= CONFIG.WEEKLY_MAX){ toast("Максимум " + CONFIG.WEEKLY_MAX + " квестов на неделю", "bad"); return; }
  S.weekly.quests.push({ id: "wq" + Date.now(), label, cat, reward, penalty: Math.max(0, penalty), target, progress: 0, done: false });
  UI.modal = null;
  persist(); render();
  toast("📅 Квест недели добавлен");
}
function wqStep(id, dir){
  const q = S.weekly.quests.find(x => x.id === id);
  if(!q) return;
  if(dir > 0){
    if(q.done) return;
    q.progress++;
    if(q.progress >= q.target){
      q.progress = q.target;
      q.done = true;
      logExact(q.cat, "📅 Квест недели: " + q.label, q.reward, { wq: q.id });
      return;
    }
    persist(); render();
    toast("Прогресс: " + q.progress + "/" + q.target);
  } else {

  }

  if(!confirm("Удалить квест «" + q.label + "»?" + (q.done ? " Полученная награда останется." : ""))) return;

function toggleQuest(key){
  ensureDailyFresh();
  S.daily.checks[key] = !S.daily.checks[key];
  const all = CONFIG.DAILY_QUESTS.every(q => S.daily.checks[q.key]);
  if(all && !S.daily.claimed){
    S.daily.claimed = true;
    S.discipline.xp += CONFIG.PERFECT_DAY.xp;
    S.gold += CONFIG.PERFECT_DAY.gold;
    S.perfectDays++;
    touchDay();
    S.history.unshift({ ts: Date.now(), cat: "discipline", label: "🌟 Perfect Day — все квесты закрыты", points: CONFIG.PERFECT_DAY.xp, gold: CONFIG.PERFECT_DAY.gold, sys: true });

  }

function doRandomQuest(id){
  ensureDailyFresh();
  const entry = (S.daily.random || []).find(r => r.id === id);
  if(!entry || entry.done) return;
  const q = CONFIG.RANDOM_QUESTS.find(x => x.id === id);
  if(!q) return;
  entry.done = true;
  const allDone = S.daily.random.every(r => r.done);
  logAction(q.cat, "🎲 " + q.label, q.points, q.skill || null, q.tag || null, { rq: id });

function doUrgent(){
  ensureDailyFresh();
  if(!S.daily.urgent || S.daily.urgent.done) return;
  const uq = CONFIG.URGENT.QUESTS.find(q => q.id === S.daily.urgent.id);
  if(!uq) return;
  S.daily.urgent.done = true;
  logExact(uq.cat, "❗ Срочный квест: " + uq.label, uq.reward, { uq: uq.id });

function buyItem(id){
  const item = CONFIG.SHOP.find(i => i.id === id);
  if(!item || S.gold < item.price || S.inventory.includes(id)) return;
  S.gold -= item.price;
  S.inventory.push(id);
  S.equipped[item.slot] = id;
  toast(item.icon + " Куплено: " + item.name);
  checkAch();
  persist(); render();
}
function toggleEquip(id){
  const item = CONFIG.SHOP.find(i => i.id === id);
  if(!item || !S.inventory.includes(id)) return;
  S.equipped[item.slot] = S.equipped[item.slot] === id ? null : id;
  persist(); render();
}
function choosePerk(id){

  if(!perk) return;
  S.perks.push({ id: perk.id, stat: perk.stat, label: perk.label });

/* ── откат ── */
function undoLast(){
  const h = S.history[0];
  if(!h){ toast("Журнал пуст", "bad"); return; }
  if(h.sys){ toast("Это системное событие — используй откат дня", "bad"); return; }
  applyStatDelta(h.cat, -h.points);
  S.gold = Math.max(0, S.gold - (h.gold || 0));
  if(h.skill && h.skillGain) S.skills[h.skill] = Math.max(0, (S.skills[h.skill] || 0) - h.skillGain);
  if(h.rq){ const e = (S.daily.random || []).find(r => r.id === h.rq); if(e) e.done = false; }
  if(h.uq && S.daily.urgent && S.daily.urgent.id === h.uq) S.daily.urgent.done = false;
  if(h.wq){ const q = S.weekly.quests.find(x => x.id === h.wq); if(q){ q.done = false; q.progress = Math.max(0, q.target - 1); } }
  S.history.shift();
  persist(); render();
  toast("↩️ Отменено: " + h.label.slice(0, 40));
}

function rollback(kind){
  if(kind === "all"){ resetSave(); return; }
  let src = null;
  if(kind === "day") src = SNAPS[today()] ? today() : null;
  if(kind === "week") src = findSnapAtOrBefore(dateShift(7));
  if(kind === "month") src = findSnapAtOrBefore(dateShift(30));
  if(!src){ toast("Нет точки отката за этот период", "bad"); return; }
  if(!confirm("Откатить прогресс к состоянию на " + src + "? Всё, что сделано после, будет удалено. Дневник останется.")) return;
  S = migrate(JSON.parse(SNAPS[src]));
  Object.keys(SNAPS).forEach(d => { if(d > src) delete SNAPS[d]; });
  SNAPS[today()] = JSON.stringify(S);
  persistSnaps(); persist();
  UI.modal = null;
  toast("⏪ Откат выполнен: " + src);
  render();
}

function resetSave(){
  if(confirm("Точно сбросить ВЕСЬ прогресс? Это нельзя отменить. Записи дневника останутся.")){
    S = fresh();
    SNAPS = {}; SNAPS[today()] = JSON.stringify(S);
    persistSnaps(); persist();
    UI.modal = null;
    toast("Новая игра начата");
    render();
  }
}

/* ── сейв ── */
function exportSave(){ UI.modal = "export"; render(); }
function importApply(){
  const ta = document.getElementById("importArea");
  if(!ta) return;
  try {
    const parsed = JSON.parse(ta.value.trim());
    let saveObj = null;
    if(parsed && parsed.__bundle && parsed.save){
      saveObj = parsed.save;
      if(Array.isArray(parsed.notes)){ NOTES = parsed.notes; persistNotes(); }
    } else if(parsed && parsed.stats) saveObj = parsed;
    if(!saveObj) throw 0;
    S = migrate(saveObj);
    SNAPS[today()] = JSON.stringify(S); persistSnaps();
    persist();
    UI.modal = null;
    toast("💾 Сейв загружен");
    render();
  } catch(e){ toast("Не получилось прочитать сейв — проверь текст", "bad"); }
}
function copyExport(){
  const ta = document.getElementById("exportArea");
  if(!ta) return;
  ta.select(); ta.setSelectionRange(0, 999999);
  let ok = false;
  try { ok = document.execCommand("copy"); } catch(e){}
  if(navigator.clipboard){ navigator.clipboard.writeText(ta.value).then(()=>{}).catch(()=>{}); ok = true; }
  toast(ok ? "Скопировано в буфер" : "Выдели текст и скопируй вручную", ok ? undefined : "bad");
}

    html += '<div class="empty">Впиши свои задачи на неделю: название, стат, награда и штраф за провал.</div>';

  html += S.weekly.quests.map(q => {

      '<span class="wqprog">'+(q.done ? '<span class="ok">✔</span>' : q.progress+'/'+q.target)+'</span>'+
      '<div style="flex:1"><div class="wqlabel'+(q.done?' done':'')+'">'+esc(q.label)+'</div>'+
      '<div class="wqmeta">'+cat.icon+' '+cat.name+' · +'+q.reward+' XP'+(q.penalty>0 ? ' · провал −'+q.penalty : ' · без штрафа')+'</div></div>'+
      (!q.done && q.progress > 0 ? '<button class="wqbtn minus" data-act="wqstep" data-id="'+q.id+'" data-dir="-1">−</button>' : '')+
      (!q.done ? '<button class="wqbtn plus" data-act="wqstep" data-id="'+q.id+'" data-dir="1">＋</button>' : '')+
      '<button class="wqbtn del" data-act="wqdel" data-id="'+q.id+'">✕</button>'+

  html += '<div class="hint">Награда и штраф применяются как есть, без Hard-модификатора. В новую неделю невыполненные квесты со штрафом минусуют стат, список очищается.</div></div>';

  html += '<div class="panel"><div class="phead">⚔️ БОССЫ</div>';
  html += CONFIG.BOSSES.map(b => {

    const prog = b.type === "streak" ? S.streak : countTag(b.countTag);
    const pct = Math.min(100, (prog / b.target) * 100);
    return '<div class="boss" style="opacity:'+(done?.55:1)+'">'+
      '<div class="bosstop"><div class="bossname" style="color:'+(done?"#4bc9a8":"#f3f3fb")+'">'+(done?"✓ ":"⚔️ ")+esc(b.name)+'</div>'+

      '<div class="xpnum">'+Math.min(prog,b.target)+'/'+b.target+'</div></div>';
  }).join("");
  html += '</div>';
  return html;
}

function weekChartHTML(){
  const mon = new Date(weekMonday()+"T00:00:00");
  const labels = ["ПН","ВТ","СР","ЧТ","ПТ","СБ","ВС"];
  const days = [];
  for(let i = 0; i < 7; i++){
    const d = new Date(mon.getTime() + i*86400000);
    days.push({ label: labels[i], date: dstr(d), xp: 0 });
  }
  S.history.forEach(h => {
    const hd = dstr(new Date(h.ts));
    const day = days.find(x => x.date === hd);
    if(day) day.xp += h.points;
  });
  const maxAbs = Math.max(1, ...days.map(d => Math.abs(d.xp)));
  const t = today();
  return '<div class="panel"><div class="phead">📊 XP ЗА НЕДЕЛЮ</div><div class="chart">'+
    days.map(d => {
      const h = Math.round(Math.abs(d.xp) / maxAbs * 80);
      const isToday = d.date === t;
      const cls = "cbar" + (d.xp < 0 ? " neg" : isToday ? " today" : "");
      return '<div class="ccol"><div class="cval">'+(d.xp !== 0 ? (d.xp>0?"+":"")+d.xp : "")+'</div>'+
        '<div class="'+cls+'" style="height:'+Math.max(2,h)+'px"></div>'+
        '<div class="cday'+(isToday?' today':'')+'">'+d.label+'</div></div>';
    }).join("")+
    '</div><div class="hint">Суммарный XP по дням текущей недели (пн–вс).</div></div>';
}

/* ── события ── */
document.addEventListener("click", e => {
  const el = e.target.closest("[data-act]");
  if(!el) return;
  const act = el.dataset.act;
  if(act === "noop") { e.stopPropagation(); return; }
  switch(act){
    case "tab": UI.tab = el.dataset.tab; render(); break;
    case "openlog": UI.modal = "log"; UI.modalCat = el.dataset.cat; render(); break;
    case "closemodal": UI.modal = null; render(); break;
    case "log": {
      const cfg = catCfg(el.dataset.cat);
      const a = cfg.actions[+el.dataset.idx];
      if(a) logAction(cfg.key, a.label, a.points, a.skill || null, a.tag || null);
      break;
    }
    case "phys": UI.physLv = +el.dataset.lv; render(); break;
    case "physlog": {
      const p = CONFIG.PHYSICAL_INTENSITY.find(x => x.level === UI.physLv);
      if(p) logAction("health", "Физическая активность · интенсивность "+p.level+"/5", p.xp, null, "physical");
      break;
    }
    case "quest": toggleQuest(el.dataset.key); break;
    case "rquest": doRandomQuest(el.dataset.id); break;
    case "urgent": doUrgent(); break;
    case "wqopen": UI.modal = "wqadd"; render(); break;
    case "wqadd": wqAdd(); break;
    case "wqstep": wqStep(el.dataset.id, +el.dataset.dir); break;
    case "wqdel": wqDelete(el.dataset.id); break;
    case "buy": buyItem(el.dataset.id); break;
    case "equip": toggleEquip(el.dataset.id); break;
    case "perk": choosePerk(el.dataset.id); break;
    case "customopen": UI.modal = "custom"; UI.modalCat = el.dataset.cat; render(); break;
    case "customsubmit": customSubmit(); break;
    case "export": exportSave(); break;
    case "importopen": UI.modal = "import"; render(); break;
    case "importapply": importApply(); break;
    case "copyexport": copyExport(); break;
    case "undo": undoLast(); break;
    case "rollopen": UI.modal = "rollback"; render(); break;
    case "rollback": rollback(el.dataset.kind); break;
    case "addnote": addNote(); break;
    case "delnote": delNote(el.dataset.ts); break;
    case "profopen": UI.modal = "profile"; render(); break;
    case "profset": {
      const nameEl = document.getElementById("profName");
      if(nameEl && nameEl.value.trim()) S.profile.name = nameEl.value.trim().slice(0, 16);
      const k = el.dataset.k;
      let v = el.dataset.v;
      if(k === "beard") v = (v === "true");
      S.profile[k] = v;
      if(k === "gender" && v === "f"){
        S.profile.beard = false;
        if(S.profile.hair === "curtains") S.profile.hair = "long";
      }
      persist(); render();
      break;
    }
    case "profdone": {
      const nameEl = document.getElementById("profName");
      if(nameEl && nameEl.value.trim()) S.profile.name = nameEl.value.trim().slice(0, 16);
      persist(); UI.modal = null; render();
      break;
    }
  }
});
document.addEventListener("visibilitychange", () => { if(!document.hidden) ensureToday(); });
setInterval(() => { const el = document.getElementById("clock"); if(el) el.textContent = fmtClock(); }, 30000);

ensureWeek();
ensureSnapshot();
render();
</script>
</body>
</html>
